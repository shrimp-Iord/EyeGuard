name: EyeGuard guardrail

# Runs the security-invariant test on every PR to main. In branch protection,
# make this a REQUIRED status check so a PR that weakens EyeGuard can't merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  guardrail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python tests/test_guardrail.py
